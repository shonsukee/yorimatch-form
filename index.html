<!DOCTYPE html>
<html lang="ja" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yorimatch サポート</title>
    <meta
        name="description"
        content="Yorimatch に関するお問い合わせフォームです。送信ボタンを押すとメールアプリが起動します。"
    >
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#F97316',
                            600: '#EA580C',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
        }

        textarea {
            resize: vertical;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-10">
        <div class="max-w-md mx-auto px-4 py-4 flex items-center justify-center relative">
            <h1 class="text-lg font-semibold tracking-tight">Yorimatch サポート</h1>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 py-6">
        <p class="text-sm text-gray-600 dark:text-gray-400 mb-6 leading-6">
            Yorimatch をご利用いただきありがとうございます。<br>
            アプリに関するお問い合わせはこちらからお願いします。<br>
            「送信する」ボタンを押すとメールアプリが起動します。
        </p>

        <form id="contactForm" class="space-y-5" novalidate>
            <div>
                <label for="category" class="block text-sm font-medium mb-1">
                    お問い合わせ種別 <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <select
                        id="category"
                        name="category"
                        required
                        class="block w-full appearance-none bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors"
                    >
                        <option value="" selected disabled>選択してください</option>
                        <option value="バグ・不具合の報告">バグ・不具合の報告</option>
                        <option value="機能の要望">機能の要望</option>
                        <option value="アプリの使い方について">アプリの使い方について</option>
                        <option value="その他">その他</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500 dark:text-gray-400">
                        <svg class="h-4 w-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" aria-hidden="true">
                            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium mb-1">
                    返信用メールアドレス <span class="text-red-500">*</span>
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="example@example.com"
                    class="block w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors placeholder-gray-400 dark:placeholder-gray-500"
                >
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="iosVersion" class="block text-sm font-medium mb-1">
                        iOS バージョン <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        id="iosVersion"
                        name="iosVersion"
                        required
                        placeholder="例: 26.0"
                        class="block w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors placeholder-gray-400 dark:placeholder-gray-500"
                    >
                </div>

                <div>
                    <label for="appVersion" class="block text-sm font-medium mb-1">
                        アプリバージョン <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        id="appVersion"
                        name="appVersion"
                        required
                        placeholder="例: 1.0.0"
                        class="block w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors placeholder-gray-400 dark:placeholder-gray-500"
                    >
                </div>
            </div>

            <div>
                <label for="message" class="block text-sm font-medium mb-1">
                    お問い合わせ内容 <span class="text-red-500">*</span>
                </label>
                <textarea
                    id="message"
                    name="message"
                    rows="6"
                    required
                    placeholder="具体的な状況やご要望をご記入ください。"
                    class="block w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors placeholder-gray-400 dark:placeholder-gray-500"
                ></textarea>
            </div>

            <div id="errorMessage" class="hidden text-sm text-red-500 text-center font-medium">
                未入力または入力形式に誤りがある項目があります。
            </div>

            <div class="pt-4 pb-8">
                <button
                    type="submit"
                    class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-3.5 px-4 rounded-xl shadow-sm transition-colors active:scale-[0.98] duration-200 flex justify-center items-center"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 mr-2" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                    </svg>
                    メールアプリを起動して送信する
                </button>
            </div>
        </form>
    </main>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function (event) {
            event.preventDefault();

            const form = event.currentTarget;
            const category = document.getElementById('category').value.trim();
            const email = document.getElementById('email').value.trim();
            const iosVersion = document.getElementById('iosVersion').value.trim();
            const appVersion = document.getElementById('appVersion').value.trim();
            const message = document.getElementById('message').value.trim();
            const errorMessage = document.getElementById('errorMessage');

            if (!form.checkValidity() || !category || !email || !iosVersion || !appVersion || !message) {
                errorMessage.classList.remove('hidden');
                return;
            }

            errorMessage.classList.add('hidden');

            const toEmail = 'yorimatch.support@gmail.com';
            const subject = `[Yorimatch お問い合わせ] ${category}`;
            const body = `※このまま送信してください。

【お問い合わせ種別】
${category}

【返信用メールアドレス】
${email}

【ご利用環境】
iOSバージョン: ${iosVersion}
アプリバージョン: ${appVersion}

【お問い合わせ内容】
${message}
`;

            const mailtoLink = `mailto:${toEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            window.location.href = mailtoLink;
        });
    </script>
</body>
</html>
